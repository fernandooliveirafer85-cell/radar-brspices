<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Radar BR Spices</title>
<style>
  :root { --bg:#0f1e2d; --card:#15283c; --teal:#74AFAE; --txt:#E6E6E6; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI',sans-serif; background:var(--bg); color:var(--txt);
         min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .card { background:var(--card); border-radius:14px; padding:48px 56px; text-align:center;
          box-shadow:0 10px 40px rgba(0,0,0,.4); }
  h1 { font-size:28px; letter-spacing:.5px; }
  h1 span { color:var(--teal); }
  p { margin-top:12px; color:#9fb3c8; font-size:14px; }
  .badge { display:inline-block; margin-top:22px; padding:6px 16px; border:1px solid var(--teal);
           border-radius:999px; color:var(--teal); font-size:12px; letter-spacing:1px; }
</style>
</head>
<body>
  <div class="card">
    <h1>📡 Radar <span>BR Spices</span></h1>
    <p>Painel comercial — gestão, gerentes e vendedores</p>
    <div class="badge">EM CONSTRUÇÃO · v0.1</div>
  </div>
</body>
</html>
